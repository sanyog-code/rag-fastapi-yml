name: Trainer CI (Build FAISS)

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train and Build FAISS
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python -c "from app.rag_pipeline import create_rag_pipeline; create_rag_pipeline()"

      - name: Upload FAISS
        uses: actions/upload-artifact@v4
        with:
          name: faiss_store
          path: faiss_store/